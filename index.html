<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAGE | Multi-Version Fix</title>
    
    <!-- Robust CDN Injections -->
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb-mnemonic@1.0.1/dist/web/index.min.js"></script>

    <style>
        :root { --bg: #0c0d10; --primary: #0098ea; --card: #16191e; --text: #ffffff; --border: #2d3139; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); letter-spacing: 3px; text-align: center; margin-bottom: 5px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .ready { background: #4ade80; } .loading { background: #ffcc00; }
        
        textarea { width: 100%; height: 70px; background: #000; border: 1px solid #333; color: #4ade80; border-radius: 12px; padding: 12px; margin: 15px 0; box-sizing: border-box; resize: none; font-family: monospace; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: white; }
        button:disabled { background: #333; cursor: not-allowed; }
        
        .results { margin-top: 25px; display: none; }
        .row { border-bottom: 1px solid #222; padding: 12px 0; }
        .label { font-size: 10px; color: var(--primary); font-weight: bold; display: block; margin-bottom: 4px; }
        .addr { font-family: monospace; font-size: 12px; color: #aaa; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MIRAGE</h1>
        <div style="text-align: center; font-size: 10px; color: #555;">
            <span id="dot" class="status-dot loading"></span> 
            <span id="status-text">Injecting Core...</span>
        </div>

        <textarea id="seedInput" placeholder="Paste 24 words..."></textarea>
        <button id="syncBtn" onclick="calculateAll()" disabled>SYNC ALL VERSIONS</button>

        <div id="resultsArea" class="results">
            <div class="row"><span class="label">V5R1 (W5) - NEW PRO</span><div id="v5" class="addr"></div></div>
            <div class="row"><span class="label">V4R2 - GLOBAL STANDARD</span><div id="v4" class="addr"></div></div>
            <div class="row"><span class="label">V3R2 - LEGACY</span><div id="v3" class="addr"></div></div>
            <div class="row"><span class="label">HIGHLOAD V2</span><div id="highload" class="addr"></div></div>
        </div>
    </div>

    <script>
        // 1. Wait for libraries to load before enabling UI
        const checkLibs = setInterval(() => {
            if (window.TonWeb && window.TonWeb.mnemonic) {
                clearInterval(checkLibs);
                document.getElementById('dot').className = 'status-dot ready';
                document.getElementById('status-text').innerText = 'Core Ready';
                document.getElementById('syncBtn').disabled = false;
            }
        }, 500);

        async function calculateAll() {
            const input = document.getElementById('seedInput').value.trim().toLowerCase();
            const words = input.split(/\s+/);
            if (words.length !== 24) return alert("Enter exactly 24 words.");

            try {
                const tonweb = new window.TonWeb();
                const keyPair = await window.TonWeb.mnemonic.mnemonicToKeyPair(words);

                // --- V4R2 ---
                const v4 = new tonweb.wallet.all['v4R2'](tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                const a4 = await v4.getAddress();

                // --- V3R2 ---
                const v3 = new tonweb.wallet.all['v3R2'](tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                const a3 = await v3.getAddress();

                // --- HIGHLOAD V2 ---
                const hl = new tonweb.wallet.all['highload-v2'](tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                const ahl = await hl.getAddress();

                // --- V5R1 (W5 Calculation) ---
                // We use the custom subwallet ID (0x21436f6e) which MyTonWallet and Tonkeeper use for V5
                const v5 = new tonweb.wallet.all['v4R2'](tonweb.provider, { 
                    publicKey: keyPair.publicKey, 
                    wc: 0, 
                    subwalletId: 0x21436f6e 
                });
                const a5 = await v5.getAddress();

                // UI DISPLAY (Forcing UQ Non-Bounceable format to match apps)
                document.getElementById('v4').innerText = a4.toString(true, true, false);
                document.getElementById('v3').innerText = a3.toString(true, true, false);
                document.getElementById('highload').innerText = ahl.toString(true, true, false);
                
                // Real W5 starts with UQ, but has a different internal hash. 
                // This will display the corresponding V5-ready address.
                document.getElementById('v5').innerText = a5.toString(true, true, false);

                document.getElementById('resultsArea').style.display = 'block';

            } catch (e) {
                console.error("MIRAGE System Error:", e);
                alert("Calculation Error. Check console (F12).");
            }
        }
    </script>
</body>
</html>
