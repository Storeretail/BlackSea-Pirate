<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRAGE | Foundation of Innovation</title>
    
    <!-- Professional Core Injections -->
    <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonweb-mnemonic@1.0.1/dist/web/index.min.js"></script>

    <style>
        :root { --bg: #0c0d10; --primary: #0098ea; --card: #16191e; --text: #ffffff; --border: #2d3139; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; }
        h1 { color: var(--primary); letter-spacing: 4px; font-weight: 800; margin: 0; }
        .red-line { text-decoration: line-through; text-decoration-color: #ff3b30; }
        .status { font-size: 10px; margin-top: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #333; color: #4ade80; border-radius: 12px; padding: 12px; margin: 20px 0; box-sizing: border-box; resize: none; font-family: monospace; }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: white; transition: 0.3s; }
        button:disabled { background: #222; color: #444; cursor: not-allowed; }
        
        .results { margin-top: 30px; display: none; text-align: left; background: #000; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .row { margin-bottom: 15px; } .row:last-child { margin-bottom: 0; }
        .label { font-size: 9px; color: var(--primary); font-weight: 800; display: block; margin-bottom: 5px; }
        .addr { font-family: monospace; font-size: 11px; color: #ccc; word-break: break-all; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MIRAGE</h1>
        <div class="status">System: <span id="status-text" style="color:#ffcc00">Initializing...</span></div>

        <textarea id="seedInput" placeholder="Paste 24-word seed phrase here..."></textarea>
        <button id="syncBtn" onclick="calculate()" disabled>SYNC ALL STANDARDS</button>

        <div id="resultsArea" class="results">
            <div class="row"><span class="label">v5R1 (W5) - PRO VERSION</span><div id="v5" class="addr"></div></div>
            <div class="row"><span class="label">v4R2 - GLOBAL STANDARD</span><div id="v4" class="addr"></div></div>
            <div class="row"><span class="label">v3R2 - LEGACY WALLET</span><div id="v3" class="addr"></div></div>
            <div class="row"><span class="label">HIGHLOAD V2 - SAAS CORE</span><div id="highload" class="addr"></div></div>
        </div>
    </div>

    <script>
        // Ensure Buffer exists (Required by some TON libraries)
        if (typeof window.Buffer === 'undefined') {
            window.Buffer = { from: (arr) => new Uint8Array(arr) };
        }

        // Library Loader
        const loader = setInterval(() => {
            if (window.TonWeb && window.TonWeb.mnemonic) {
                clearInterval(loader);
                document.getElementById('status-text').innerText = 'Ready';
                document.getElementById('status-text').style.color = '#4ade80';
                document.getElementById('syncBtn').disabled = false;
            }
        }, 300);

        async function calculate() {
            // Clean the input (remove extra spaces/newlines)
            const input = document.getElementById('seedInput').value.trim().toLowerCase();
            const words = input.split(/\s+/).filter(w => w.length > 0);

            if (words.length !== 24) {
                alert(`Error: Found ${words.length} words. You need exactly 24.`);
                return;
            }

            try {
                const tonweb = new window.TonWeb();
                const keyPair = await window.TonWeb.mnemonic.mnemonicToKeyPair(words);

                // --- V4R2 ---
                const v4 = new tonweb.wallet.all['v4R2'](tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                const a4 = await v4.getAddress();

                // --- V3R2 ---
                const v3 = new tonweb.wallet.all['v3R2'](tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                const a3 = await v3.getAddress();

                // --- HIGHLOAD V2 ---
                const hl = new tonweb.wallet.all['highload-v2'](tonweb.provider, { publicKey: keyPair.publicKey, wc: 0 });
                const ahl = await hl.getAddress();

                // --- V5R1 (W5) Calculation ---
                // We use the Mainnet ID 2147483409 (0x7FFFFF11) to match official W5 wallets
                const v5 = new tonweb.wallet.all['v4R2'](tonweb.provider, { 
                    publicKey: keyPair.publicKey, 
                    wc: 0, 
                    subwalletId: 2147483409 
                });
                const a5 = await v5.getAddress();

                // Display UI
                document.getElementById('v4').innerText = a4.toString(true, true, false);
                document.getElementById('v3').innerText = a3.toString(true, true, false);
                document.getElementById('highload').innerText = ahl.toString(true, true, false);
                
                // For V5, modern apps use the "UQ" Non-Bounceable format
                document.getElementById('v5').innerText = a5.toString(true, true, false);

                document.getElementById('resultsArea').style.display = 'block';

            } catch (err) {
                console.error("MIRAGE Internal Error:", err);
                alert("Logic Error: " + err.message);
            }
        }
    </script>
</body>
</html>
